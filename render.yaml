# Render Blueprint — smart-collab backend
#
# To use:
#   1. Push this file to the branch Render will watch (main, or develop for staging).
#   2. Render dashboard → New + → Blueprint → connect this repo → apply.
#   3. Render auto-fills everything below. Three values are marked `sync: false` —
#      you paste them in the dashboard after the service is created:
#        - DATABASE_URL : Neon pooled connection string from t5
#        - CORS_ORIGINS : Vercel URL from t7 (set during t8 after Vercel deploys)
#        - (optionally override region/plan if defaults don't suit)
#   4. JWT secrets and demo passwords are auto-generated by Render (generateValue: true)
#      and never leave its env store.
#   5. NODE_ENV=production triggers cookie samesite=none + CORS '*' stripping in app.ts.
#
# Adjust `region` to the closest Render region that hosts free tier in your account.
# Free tier currently supports: oregon, ohio, virginia, frankfurt, singapore.
# `virginia` is closest to the Neon project (AWS us-east-1).

services:
  - type: web
    name: smart-collab-api
    runtime: node
    plan: free
    region: virginia
    branch: develop
    rootDir: backend
    autoDeploy: true
    healthCheckPath: /healthz
    buildCommand: npm ci --include=dev && npm run build:prod
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: ENABLE_DEMO_LOGIN
        value: "true"
      - key: UPLOAD_DIR
        value: /tmp/uploads
      # COOKIE_DOMAIN intentionally a single space — backend zod schema requires min(1),
      # and an empty/space value means "do not pin cookie to a domain" so the
      # cross-site cookie scopes naturally to the Render host.
      - key: COOKIE_DOMAIN
        value: " "
      # Secrets generated by Render, stored only in its env store.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DEMO_ADMIN_PW
        generateValue: true
      - key: DEMO_PM_PW
        generateValue: true
      - key: DEMO_MEMBER_PW
        generateValue: true
      # Email pipeline — Resend chosen as default provider (1 API key + EMAIL_FROM).
      # To swap to SMTP, set EMAIL_PROVIDER=smtp and add SMTP_HOST/PORT/USER/PASS instead.
      - key: EMAIL_PROVIDER
        value: resend
      - key: EMAIL_FROM
        value: "Smart Collab <onboarding@resend.dev>" # Resend's pre-verified test sender; replace with your verified domain to send to non-signup recipients
      # User-provided in dashboard (sync: false hides them from the blueprint).
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # Email worker — drains BullMQ jobs queued by the API service. Shares
  # DATABASE_URL, REDIS_URL, RESEND_API_KEY, EMAIL_FROM with the web service.
  # Must run as a separate process so HTTP request lifecycle never blocks on
  # SMTP latency.
  - type: worker
    name: smart-collab-email-worker
    runtime: node
    plan: free
    region: virginia
    branch: develop
    rootDir: backend
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run build:prod
    startCommand: node dist/src/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: EMAIL_PROVIDER
        value: resend
      - fromService:
          type: web
          name: smart-collab-api
          envVarKey: EMAIL_FROM
      - fromService:
          type: web
          name: smart-collab-api
          envVarKey: DATABASE_URL
      - fromService:
          type: web
          name: smart-collab-api
          envVarKey: REDIS_URL
      - fromService:
          type: web
          name: smart-collab-api
          envVarKey: RESEND_API_KEY
