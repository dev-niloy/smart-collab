      boundaries; (b) the existing enqueueNotification + fanoutEmailJobs contract; (c) the
      email template shape; (d) frontend inbox formatter location.
    inputs: []
    constraints:
      - "Read-only. No implementation."
      - "MUST cover: projectMember.service.ts (addMember + updateRole), notification.service.enqueue, email.enqueue.fanoutEmailJobs, email.templates.renderEmail, email.queue.EmailJobData."
      - "MUST identify: project context query needed for full email body + cheapest way to batch it."
    expected_output:
      - "Call-graph + contract recap + data shape + slices."
    receipt:
      summary: "Confirmed addMember + updateRole have ZERO notification/email side effects. Found insertion points + existing fanout contract."
      findings:
        addMember:
          file: "backend/src/app/modules/projectMember/projectMember.service.ts:40-71"
          tx_scope: "prisma.$transaction: tx.projectMember.create + recordActivity('member.added')."
          missing: "No enqueueNotification call. No post-commit fanout. Returns MemberWithUser."
          insertion_point: "Capture user.id + project context inside tx; enqueueNotification(tx,...) inside the same tx (mirrors task.service pattern); fanoutEmailJobs AFTER tx commits."
        updateRole:
          file: "backend/src/app/modules/projectMember/projectMember.service.ts:209-226"
          tx_scope: "Bare prisma.projectMember.update — NO transaction wrapper currently."
          missing: "No notification. Also no actorId param — signature is updateRole(projectId, memberId, role). Need actorId added OR resolved via controller."
          insertion_point: "Wrap in prisma.$transaction. Detect old role first, short-circuit when newRole === oldRole. enqueueNotification inside tx. fanoutEmailJobs post-commit."
        notification_constants:
          file: "backend/src/app/modules/notification/notification.constant.ts:1-9"
          current_types: "['task.assigned','task.unassigned','task.status_changed','comment.created','comment.mention']"
          missing: "'project.member_added' + 'project.member_role_changed'"
        email_queue_contract:
          file: "backend/src/app/modules/email/email.queue.ts:16-43"
          job_name_union: "EmailJobName: task.assigned|task.unassigned|task.status_changed|comment.created|comment.mention"
          payload_shape: "{ taskTitle, taskId, projectId, projectName, commentExcerpt, commentId, status, previousStatus }"
          extension_needed: "Add 2 EmailJobName variants + payload fields: projectDescription, projectDeadline (Date|string), projectMembers (array of {name, role}), newRole, previousRole."
        email_enqueue_contract:
          file: "backend/src/app/modules/email/email.enqueue.ts"
          signature: "fanoutEmailJobs({recipientIds, actorId, actorName, type, payload}, deps?)"
          notes: "Filters opted-out users at DB query, drops actor, fast-paths when REDIS_URL unset. Reusable as-is for new types."
        templates:
          file: "backend/src/app/modules/email/email.templates.ts"
          current_cases: "comment.mention, comment.created, task.assigned, task.unassigned, task.status_changed"
          missing: "Switch cases for project.member_added + project.member_role_changed. Full-body needs new payload fields (projectDescription, projectDeadline, projectMembers list)."
        frontend_formatter:
          file: "frontend/src/app/(authed)/inbox/page.tsx:23-31"
          current: "if-else chain over types — falls through to '${actor} · ${type}' on unknown."
          missing: "2 new branches for project.member_added + project.member_role_changed. Also notificationHref should resolve to /projects/${projectId} for these (no taskId)."
        project_context_query:
          recommendation: "Single prisma.project.findUnique({ include: members.user }) call POST-COMMIT. Pull name, description, deadline, project members[].user{name, role}. ~1 query."
        verification_cmds:
          - "npm --prefix backend test → expect 676+ pass"
          - "npm --prefix backend run typecheck → pass"
          - "npx jest --testPathPattern='projectMember.service.notifications|email.templates|email.queue' --silent"
      ranked_candidates:
        - "C1: Notification constants + EmailJobName union + EmailJobData payload extension (3 files)."
        - "C2: Email templates for 2 new types (full body) (2 files: templates.ts + templates.test.ts)."
        - "C3: projectMember.service.addMember wiring (post-commit notif + fanout w/ batched project context) (3 files)."
        - "C4: projectMember.service.updateRole wiring (wrap in tx, idempotency check, notif + fanout) (3 files)."
        - "C5: Frontend inbox formatter + href for 2 new types (2 files: inbox/page.tsx + page.test.tsx)."
      verify_result: pass
      completed_at: "2026-06-06T22:15:00Z"

