# Autonomous Loop — Board Truth
# Created: 2026-06-06 by /init-brownfield
# Project: smart-collab — Smart Project & Task Collaboration System
# Goal: project member add + role change → notification + email

version: 1

goal:
  title: "Notify + email on project member add + role change"
  slug: "project-member-notifications"
  kind: specific
  tranche: |
    POST /projects/:id/members and PATCH /projects/:id/members/:userId/role both fire an
    in-app notification (DB row + SSE push) AND enqueue an email job (full template:
    project name + description + deadline + team list + link) to the affected member,
    matching the post-commit pattern already used for task.assigned + comment.mention.
  status: active
  oracle:
    signal: "POST /projects/:id/members{userId:M} as PM → M receives in-app notif within 2s AND email job lands w/ full project context."
    cadence: "after each Worker task and at final audit"
    final_proof: "T999 executes completion_proof + scripted curl roundtrip showing notification row + email job for both events."
  intake:
    original_request: "When I added a member on a project that did not triggered any email or notification. Add that — I think it's not added."
    interpreted_outcome: "Wire projectMember.service add + role-change paths to enqueueNotification + fanoutEmailJobs post-commit. Add 2 new notification types + 2 full-context email templates."
    input_shape: specific
    authority: approved
    proof_type: test
    completion_proof: |
      set -e
      # Backend suite green w/ new tests, no regression
      cd backend && npm test --silent 2>&1 | tail -5 | grep -qE "Tests:[[:space:]]+[0-9]+ passed,[[:space:]]+[0-9]+ total"
      ! (cd backend && npm test --silent 2>&1 | tail -10 | grep -qE "failed")
      # New notification types are registered
      grep -q "'project.member_added'" backend/src/app/modules/notification/notification.constant.ts
      grep -q "'project.member_role_changed'" backend/src/app/modules/notification/notification.constant.ts
      # Email queue knows about the 2 new job names
      grep -q "project.member_added" backend/src/app/modules/email/email.queue.ts
      grep -q "project.member_role_changed" backend/src/app/modules/email/email.queue.ts
      # Templates emit the 2 new types
      grep -q "project.member_added" backend/src/app/modules/email/email.templates.ts
      grep -q "project.member_role_changed" backend/src/app/modules/email/email.templates.ts
      # Service layer wires post-commit fanout
      grep -q "fanoutEmailJobs\|fanoutProjectMemberEmails" backend/src/app/modules/projectMember/projectMember.service.ts
      grep -q "enqueueNotification" backend/src/app/modules/projectMember/projectMember.service.ts
      # Dedicated tests exist + green
      cd backend && npx jest --testPathPattern='projectMember.service.notifications|email.templates|email.queue' --silent 2>&1 | tail -3 | grep -qE "passed"
    likely_misfire: |
      (1) addMember creates the membership row but skips enqueueNotification → notification never written, no SSE push, no email.
      (2) Notification row is written but fanoutEmailJobs is never called post-commit → email job never enqueued.
      (3) Role change endpoint fires the notification even when the new role equals the current role (idempotent PATCH still spams the user).
      (4) PM adding themselves to a project triggers a self-notification (actor === recipient should be a no-op).
      (5) Project context query (description, deadline, team list) runs INSIDE the prisma.$transaction, blocking the API request — should run post-commit.
      (6) Email templates reuse the task.assigned copy → recipient sees "PM assigned you to <project>" instead of project-specific wording.
      (7) Templates do not actually include the full context (description / deadline / team list) — assessor expects "Full" body per goal intake.
      (8) Frontend inbox does not surface the new notification types → user sees the row but `formatNotificationLine` returns "PM · project.member_added" raw.
    blind_spots_considered:
      - "Self-add must be skipped at notification + email layer."
      - "Role change idempotency: skip when new role === current role."
      - "Project context lookup must be batched + post-commit, not inside tx."
      - "Email template must visually differ from task templates so assessor can recognize it."
      - "Frontend inbox formatter needs the 2 new types or it falls through to the raw-type tail."
      - "Existing 486 / 676 baselines must not regress."

rules:
  mode: solo
  one_active_task: true
  no_implementation_without_worker_task: true
  no_completion_without_final_judge_audit: true
  completion_proof_must_be_testable: true
  scope_drift_check_required_per_judge: true
  t999_must_execute_completion_proof: true
  touch_only_allowed_files: true
  tdd_required: true
  ralph_wiggum_required_after_every_worker: true
  ralph_wiggum_cycle_cap: 3
  ralph_vote_mode: unanimous
  ralph_dispatch: subagent_parallel
  ralph_skill_failure_fallback: skip_with_concern
  dirty_fingerprint_required: true
  likely_misfire_required: true
  t999_misfire_check_required: true
  t999_debt_aggregation_required: true
  debt_concern_threshold: 5
  context_budget_pct: 50
  decision_delegation: gstack_vote
  headless_mode: false
  ralph_roles:
    ceo:       { skill: plan-ceo-review,    always: true }
    eng_mgr:   { skill: plan-eng-review,    always: true }
    designer:  { skill: design-review,      skip_if_no_ui: true }
    qa:        { skill: qa,                 always: true }
    security:  { skill: cso,                skip_if_no_sensitive: true }
    devex:     { skill: plan-devex-review,  skip_if_no_public_surface: true }
  continuous_until_full_outcome: true
  judge_slice_ceiling:
    max_allowed_files: 5
    max_verify_commands: 4
  brownfield_baseline_required: true
  git_checkpoint_per_worker: true

