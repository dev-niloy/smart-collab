version: 1

goal:
  title: "Email service + realtime SSE notifications for mention/assign/comment"
  slug: "email-realtime-notifications"
  kind: specific
  tranche: |
    Pluggable email service (Resend OR SMTP via .env) wired to mention/assign/comment events,
    sent asynchronously via BullMQ+Redis queue, respecting per-user emailNotifications toggle.
    Realtime notification delivery via SSE replacing 30s frontend polling.
    Pre-existing activityLog cursor test flake fixed first.
  status: done
  abandoned_reason: null
  abandoned_at: null
  oracle:
    signal: "End-to-end: User A @mentions User B in comment → (a) email lands in User B's inbox via configured provider; (b) User B's open browser shows badge increment within 2s via SSE without 30s poll wait."
    cadence: "after each Worker task and at final audit"
    final_proof: |
      1. Backend test suite green (628/628).
      2. Frontend test suite green.
      3. Email module unit tests cover: provider switch via .env, opt-out respected, BullMQ enqueue, retry on failure.
      4. SSE endpoint integration test: connect, publish notification, receive event payload.
      5. Manual: `curl -N $API/notifications/stream` (auth'd) prints `data: {...}` line within 2s of triggering test notification.
  intake:
    original_request: "Check if email service exists; if not, implement it for mention/assign/comment. Also check if realtime notification system works."
    interpreted_outcome: "Build pluggable email service + realtime SSE for notifications; respect user opt-out; fix baseline flake first."
    input_shape: vague
    authority: approved
    proof_type: test
    completion_proof: |
      # Goal verification: full suites green + email + SSE modules wired + green + opt-out gate enforced.
      # (Original count-pinned proof updated mid-flight to reflect intent — suites grew as new tests
      #  landed across Workers. New proof asserts "0 failures anywhere" + module presence.)
      set -e
      cd backend && npm test --silent 2>&1 | tail -5 | grep -qE "Tests:[[:space:]]+[0-9]+ passed,[[:space:]]+[0-9]+ total" \
        && ! (npm test --silent 2>&1 | tail -10 | grep -qE "failed")
      cd ../frontend && npm test 2>&1 | tail -5 | grep -qE "Tests[[:space:]]+[0-9]+ passed \\([0-9]+\\)" \
        && ! (npm test 2>&1 | tail -10 | grep -qE "failed")
      cd ../backend && test -f src/app/modules/email/email.provider.ts \
        && test -f src/app/modules/email/email.factory.ts \
        && test -f src/app/modules/email/email.queue.ts \
        && test -f src/app/modules/email/email.processor.ts \
        && test -f src/app/modules/email/email.templates.ts \
        && test -f src/app/modules/email/email.enqueue.ts \
        && test -f src/app/modules/notification/notification.sse.ts \
        && test -f src/worker.ts
      cd ../backend && npx jest --testPathPattern='email\\.(factory|processor|templates)|comment\\.service\\.email|notification\\.sse' --silent 2>&1 | tail -5 | grep -qE "Tests:[[:space:]]+[0-9]+ passed"
    likely_misfire: |
      (1) Email "sends" silently — provider integration stubbed but never actually called from real triggers (mention/assign/comment paths skip email enqueue).
      (2) SSE endpoint exists but is never connected to enqueue() — clients connect, receive nothing, fall back to polling unnoticed.
      (3) Opt-out toggle in schema but never checked at send-time → emails leak to opted-out users.
      (4) BullMQ added as dep but jobs never processed (no worker process running) → queue fills, emails never sent.
      (5) Realtime works in dev but breaks on Render (Render free tier kills idle HTTP after 60s — SSE connections drop without reconnect logic).
      (6) Provider switch via .env actually hardcodes one provider; .env var ignored.
    blind_spots_considered:
      - "BullMQ requires Redis — must add to docker-compose + render.yaml or feature-flag the queue."
      - "SSE on Render free tier: connection idle timeout — need heartbeat ping every 30s."
      - "Email provider .env switch: must build provider interface, not if/else inside send()."
      - "Opt-out: schema migration on User table; must respect on EVERY send path."
      - "Polling stays as fallback if SSE connection drops — graceful degradation."

rules:
  mode: solo
  one_active_task: true
  no_implementation_without_worker_task: true
  no_completion_without_final_judge_audit: true
  completion_proof_must_be_testable: true
  scope_drift_check_required_per_judge: true
  t999_must_execute_completion_proof: true
  touch_only_allowed_files: true
  tdd_required: true
  ralph_wiggum_required_after_every_worker: true
  ralph_wiggum_cycle_cap: 3
  ralph_vote_mode: unanimous
  ralph_dispatch: subagent_parallel
  ralph_skill_failure_fallback: skip_with_concern
  dirty_fingerprint_required: true
  likely_misfire_required: true
  t999_misfire_check_required: true
  t999_debt_aggregation_required: true
  debt_concern_threshold: 5
  superpowers_invocation_required: true
  superpowers_phase_map:
    gstack:    [superpowers:brainstorming]
    judge:     [superpowers:writing-plans]
    worker:    [superpowers:test-driven-development, superpowers:verification-before-completion]
    worker_fail: [superpowers:systematic-debugging]
    ralph:     [superpowers:dispatching-parallel-agents, superpowers:subagent-driven-development]
    t999:      [superpowers:verification-before-completion, superpowers:finishing-a-development-branch, gsd-verify-work]
    gstack_extra: [gsd-discuss-phase, gsd-spec-phase]
    scout:     [gsd-map-codebase]
    judge_extra: [gsd-plan-phase]
  context_budget_pct: 50
  decision_delegation: gstack_vote
  headless_mode: false
  headless_max_iterations: 50
  headless_token_budget: 1000000
  headless_quiet_hours: "22:00-08:00"
  ralph_roles:
    ceo:       { skill: plan-ceo-review,    always: true }
    eng_mgr:   { skill: plan-eng-review,    always: true }
    designer:  { skill: design-review,      skip_if_no_ui: true }
    qa:        { skill: qa,                 always: true }
    security:  { skill: cso,                skip_if_no_sensitive: true }
    devex:     { skill: plan-devex-review,  skip_if_no_public_surface: true }
    codex:     { skill: codex,              always: false }
  continuous_until_full_outcome: true
  judge_slice_ceiling:
    max_allowed_files: 5
    max_verify_commands: 4
  brownfield_baseline_required: true
  git_checkpoint_per_worker: true

