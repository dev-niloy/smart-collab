tasks:
  # ── Phase A: backend prisma + task module skeleton ───────────────────────────
  - id: t1
    desc: "prisma: add Task model + TaskStatus (todo|in_progress|completed) + TaskPriority (low|medium|high) enums + FKs (projectId Cascade, createdBy Restrict, assignedTo SetNull). Indexes on [projectId, status], [assignedTo], [dueDate]. snake_case @@map(tasks)"
    files: [backend/prisma/schema.prisma]
    status: done
    receipt: "Task model added with all required fields + 3 FKs (projectId Cascade, createdBy Restrict, assignedTo SetNull). Both enums declared. 3 indexes. User model extended with tasksCreated + tasksAssigned back-relations. Project model extended with tasks back-relation."

  - id: t2
    desc: "create + apply migration add_task; smoke test row count via prisma client"
    files: [backend/prisma/migrations/20260603170707_add_task/migration.sql, backend/src/config/__tests__/prisma.test.ts]
    status: done
    receipt: "Migration 20260603170707_add_task applied to docker postgres. prisma generate ran. Added one assertion to existing prisma.test.ts: prisma.task.count() resolves to number. 4 prisma smoke tests pass."

  - id: t3
    desc: "task.constant.ts: STATUSES, PRIORITIES, SORT_KEYS, DEFAULT_LIMIT=10, MAX_LIMIT=50, PAST_DEADLINE_MESSAGE (reuse text 'Please select a valid deadline.'), DUPLICATE_TASK_TITLE_MESSAGE 'Task title already exists in this project.', REASSIGN_COMPLETED_MESSAGE 'Cannot reassign a completed task.'"
    files: [backend/src/app/modules/task/task.constant.ts]
    status: done
    receipt: "All constants exported: STATUSES (todo|in_progress|completed), PRIORITIES (low|medium|high), SORT_KEYS (created|dueDate|priority|updated), DEFAULT_LIMIT=10, MAX_LIMIT=50, DEFAULT_PAGE=1, DEFAULT_SORT='created', UNASSIGNED='unassigned' literal. 3 assessment §4 verbatim messages."

  - id: t4
    desc: "task.validation.ts: Zod schemas createTaskSchema, updateTaskSchema (refine: at least one field), listTasksQuerySchema (q, status, priority, assignedTo accepts uuid or 'unassigned', sort, page, limit capped at 50), taskIdParamSchema. Validation unit tests"
    files: [backend/src/app/modules/task/task.validation.ts, backend/src/app/modules/task/__tests__/task.validation.test.ts]
    status: done
    receipt: "createTaskSchema (projectId uuid, title 1-200, optional description 5000, dueDate coerce, status default todo, priority default medium, assignedTo nullable optional uuid). updateTaskSchema all optional + at-least-one refine. listTasksQuerySchema: status/priority transform unknown -> undefined; assignedTo accepts uuid OR 'unassigned' literal, drops invalid silently; sort enum; limit cap 50. taskIdParamSchema + projectIdParamSchema. 15/15 validation tests pass."

  - id: t5
    desc: "task.service.ts CRUD core: create (check project exists + dup title in project, sets createdBy from actor), findById (include creator+assignee), update (guards: future deadline, no dup title, no reassign-while-completed), remove. P2025 -> 404 (duck-typed). Service unit tests against real prisma"
    files: [backend/src/app/modules/task/task.service.ts, backend/src/app/modules/task/__tests__/task.service.crud.test.ts]
    status: done
    receipt: "Service exports create/findById/update/remove with creator+assignee embed via userSelect (id,email,name,role). create: ensureFutureDeadline + ensureProjectExists + ensureTitleUnique. update: re-reads current row to check title diff + reassign-while-completed (also catches PATCH transitioning to completed AND reassigning in same call). remove: hard delete + P2025 -> 404. All exceptions via ApiError. 19/19 service.crud tests pass incl cascade (deleting parent project removes tasks)."

  - id: t6
    desc: "task.service.ts list({projectId, q, status, priority, assignedTo, sort, page, limit}): Prisma where with project filter, contains-insensitive title, status/priority equality, assignedTo eq or null when 'unassigned'. orderBy switch (created/dueDate/priority/updated). $transaction(findMany,count). Tests for each filter, sort, pagination, unassigned filter"
    files: [backend/src/app/modules/task/task.service.ts, backend/src/app/modules/task/__tests__/task.service.list.test.ts]
    status: done
    receipt: "list returns {data,total,page,limit}. buildAssignedToWhere maps UNASSIGNED -> null, uuid -> eq. orderBy switch: created->createdAt desc, dueDate->dueDate asc, priority->priority desc + createdAt desc tiebreak (postgres enum order low<med<high so desc puts high first), updated->updatedAt desc. $transaction(findMany,count). 11/11 list tests: filter by projectId, status, priority, assignee uuid, unassigned, q contains, sort dueDate ascending, sort priority high-first, pagination disjoint slice, cross-project list, embedded creator+assignee. BACKEND TOTAL 181/181 jest (+46 for tasks)."

  # ── Phase B: backend controller + routes + users endpoint ────────────────────
  - id: t7
    desc: "task.controller.ts (thin) + task.routes.ts: requireAuth global; create open to all authed; ownership middleware for PATCH (admin/PM bypass; otherwise actor must be createdBy OR assignedTo); requireRole admin/PM on DELETE. Mount /api/v1/tasks. Integration happy-path tests (admin creates, member creates, member edits own, admin deletes)"
    files: [backend/src/app/modules/task/task.controller.ts, backend/src/app/modules/task/task.ownership.ts, backend/src/app/modules/task/task.routes.ts, backend/src/app/routes/index.ts, backend/src/app/modules/task/__tests__/task.routes.test.ts]
    status: done
    receipt: "Controller (5 thin handlers, typed ListTasksQuery cast). Ownership middleware requireTaskOwnerOrPrivileged: admin/PM bypass; member must be createdBy OR assignedTo, else 403 FORBIDDEN_OWNERSHIP (404 if task missing). Routes: requireAuth global, create open to all authed (members can create), PATCH order = validate(params) -> ownership middleware -> validate(body) -> handler, DELETE gated by requireRole('admin','project_manager'). Mounted at /api/v1/tasks. Tests 8/8: admin creates w/ creator+assignee embed, member creates (members can create), all 3 roles list w/ embedded relations, member edits own (createdBy=self), member edits assigned (assignedTo=self), admin deletes -> 204 then GET 404, PM deletes -> 204, list filters via query string (status+priority+assignedTo). BACKEND TOTAL 189/189 jest (+8)."

  - id: t8
    desc: "integration negative paths: 401 unauth, 403 member edits non-own task, 403 member tries DELETE, 404 missing id, 422 invalid body, pagination cap (limit=999 -> 50)"
    files: [backend/src/app/modules/task/__tests__/task.routes.test.ts]
    status: done
    receipt: "+12 negative tests (total task.routes 20/20): 401 MISSING_TOKEN on list + POST, 403 FORBIDDEN_OWNERSHIP (member edits non-own, non-assigned task), 403 FORBIDDEN_ROLE (member DELETE), 404 TASK_NOT_FOUND on GET/PATCH/DELETE unknown id, member PATCH unknown id also 404 (ownership middleware checks existence first), 422 VALIDATION_ERROR (invalid POST body, invalid uuid path param, empty PATCH body via at-least-one refine), pagination cap limit=999 -> 50. BACKEND TOTAL 201/201 (+12)."

  - id: t9
    desc: "validation rules end-to-end: POST + PATCH past deadline -> 422 PAST_DEADLINE assessment-verbatim; POST duplicate title in same project -> 422 DUPLICATE_TASK_TITLE; PATCH assignedTo while status=completed -> 422 REASSIGN_COMPLETED. Same title in DIFFERENT project allowed"
    files: [backend/src/app/modules/task/__tests__/task.routes.test.ts]
    status: done
    receipt: "+8 e2e validation tests (total 28/28 task.routes). POST past dueDate -> 422 PAST_DEADLINE 'Please select a valid deadline.'; PATCH past dueDate -> same. POST dup title same project (case-insensitive) -> 422 DUPLICATE_TASK_TITLE 'Task title already exists in this project.'; PATCH title to existing -> same. Same title in DIFFERENT project allowed (201). PATCH assignedTo while status=completed -> 422 REASSIGN_COMPLETED 'Cannot reassign a completed task.'; PATCH transitioning to completed + reassign in same call -> 422 same code. PATCH status -> completed (no reassign) allowed -> 200. All 3 assessment §4 verbatim messages verified end-to-end. BACKEND TOTAL 209/209 (+8)."

  - id: t10
    desc: "user.controller.ts list + user.routes.ts: GET /api/v1/users -> [{id,email,name,role}] all authed; mount under /api/v1/users; integration tests for shape + auth gate (401 unauth)"
    files: [backend/src/app/modules/user/user.controller.ts, backend/src/app/modules/user/user.routes.ts, backend/src/app/routes/index.ts, backend/src/app/modules/user/__tests__/user.routes.test.ts]
    status: done
    receipt: "user.controller.list selects {id,email,name,role} only (no passwordHash, no createdAt/updatedAt) orderBy name asc. user.routes applies requireAuth globally. Mounted at /api/v1/users. Tests 5/5: 401 MISSING_TOKEN unauth, admin sees >=3 demo users, minimal shape verified (presence of 4 fields + absence of passwordHash/timestamps), member can also list (assignee picker UX), PM can also list. BACKEND TOTAL 214/214 (+5)."

  - id: t11
    desc: "GET /api/v1/projects/:id/tasks convenience route: delegates to taskService.list with projectId from params. Integration test confirms it equals /api/v1/tasks?projectId="
    files: [backend/src/app/modules/project/project.routes.ts, backend/src/app/modules/project/project.controller.ts, backend/src/app/modules/project/__tests__/project.routes.test.ts]
    status: done
    receipt: "projectController.listTasks: ensures project exists first (404 PROJECT_NOT_FOUND if missing), then delegates to taskService.list with projectId from params overriding any query projectId. Route validates both params (uuid) + listTasksQuerySchema. Tests 4/4 added (project.routes 22/22 total): returns paginated tasks scoped to project, 404 unknown project, 401 unauth, query filters honored (status). BACKEND TOTAL 218/218 (+4). Phase B complete (t7-t11)."

  # ── Phase C: frontend lib + hooks + format helpers ───────────────────────────
  - id: t12
    desc: "lib/schemas/task.ts (mirror backend Zod) + lib/tasks.ts (createTask, listTasks, getTask, updateTask, deleteTask) + lib/users.ts (listUsers). Zod v4 syntax. Unit tests for schema + client"
    files: [frontend/src/lib/schemas/task.ts, frontend/src/lib/tasks.ts, frontend/src/lib/users.ts, frontend/src/lib/__tests__/tasks.test.ts, frontend/src/lib/__tests__/users.test.ts, frontend/src/lib/schemas/__tests__/task.test.ts]
    status: done
    receipt: "schemas/task.ts mirrors backend: TASK_STATUSES, TASK_PRIORITIES, SORT_KEYS, UNASSIGNED literal, 3 verbatim §4 messages exported. createTaskSchema (projectId uuid, title 1-200, optional desc 5000, dueDate coerce, status default todo, priority default medium, assignedTo nullable uuid). updateTaskSchema all optional + at-least-one refine. listTasksQuerySchema with limit cap 50. Task type embeds creator + nullable assignee. tasks.ts: listTasks/listTasksForProject (nested) buildQuery via URLSearchParams; getTask/createTask/updateTask unwrap {task}; serializes Date dueDate -> ISO; deleteTask void. users.ts: listUsers unwraps {data}. Tests 22/22: 11 schema (defaults, refusals, assignedTo null, limit cap, status/priority validation, assignedTo passthrough), 9 tasks client (URL building, nested route, ISO serialization, void delete, ApiError on 422 DUPLICATE_TASK_TITLE), 2 users client (data unwrap, 401 ApiError). Zod v4 UUID test fixed (v4 strict format requires actual v4 uuid). Frontend 96/96 vitest (+22), typecheck + lint clean."

  - id: t13
    desc: "lib/task-format.ts (STATUS_LABEL, STATUS_VARIANT, PRIORITY_LABEL, PRIORITY_VARIANT, mirrors lib/project-format). Unit tests"
    files: [frontend/src/lib/task-format.ts, frontend/src/lib/__tests__/task-format.test.ts]
    status: done
    receipt: "STATUS_LABEL (Todo/In Progress/Completed), STATUS_VARIANT (outline/default/secondary), PRIORITY_LABEL (Low/Medium/High), PRIORITY_VARIANT (outline/secondary/destructive — high signals urgency via destructive variant). fmtDate + fmtDateTime mirror project-format. 8/8 tests. Extracted from start per Ralph lesson (avoids future Architect refactor)."

  - id: t14
    desc: "hooks/useTasks.ts (useTasks(projectId, filters), useTask(id), useCreateTask, useUpdateTask, useDeleteTask with TanStack invalidation on ['tasks', projectId] + ['task', id]) + hooks/useUsers.ts. Unit tests stubbing fetch"
    files: [frontend/src/hooks/useTasks.ts, frontend/src/hooks/useUsers.ts, frontend/src/hooks/__tests__/useTasks.test.tsx, frontend/src/hooks/__tests__/useUsers.test.tsx]
    status: done
    receipt: "useTasks(params) -> ['tasks', params]. useProjectTasks(projectId, params) -> ['tasks','project',projectId, params] enabled gated on projectId, hits nested route via listTasksForProject. useTask(id) enabled gated. useCreateTask/useUpdateTask(id): onSuccess setQueryData(['task',id], task) + invalidate ['tasks'] (parent key invalidates all task lists). useDeleteTask: removeQueries + invalidate. useUsers -> ['users'] staleTime 60s. Tests 11/11 (9 useTasks + 2 useUsers): list fetch w/ params, useProjectTasks idle/active, useTask disabled/active, create/update prime detail + invalidate, delete removes + invalidates, create propagates ApiError on 422 DUPLICATE_TASK_TITLE, useUsers fetch + 401 error state. Frontend 115/115 vitest (+19 for t14), typecheck + lint clean."

  # ── Phase D: frontend pages ─────────────────────────────────────────────────
  - id: t15
    desc: "/projects/[id]/tasks/page.tsx: list with cards/rows (title, status badge, priority badge, assignee chip, due date), inline status Select that fires PATCH, toolbar (search, status filter, priority filter, assignee filter, sort), pagination prev/next, 'New Task' button for all authed (members can create), loading/empty/error states. Page interaction tests"
    files: ["frontend/src/app/projects/[id]/tasks/page.tsx", "frontend/src/app/projects/[id]/tasks/__tests__/page.test.tsx"]
    status: done
    receipt: "URL-state source-of-truth for q/status/priority/assignedTo/sort/page; router.replace on changes resets page. Debounced search (300ms) via render-time setState sync (no effect setState). useProjectTasks hits nested route. useUsers loads assignee dropdown options (Any + Unassigned + named users). Inline status Select per card uses useUpdateTask(task.id) -> PATCH; toast.error on ApiError. Card layout: title link + priority Badge top right, status Badge + inline Select, due date + assignee chip (name or 'Unassigned' italics). Skeleton loading, two empty states (no tasks vs no matches w/ clear-filters), error -> Retry. Pagination prev/next w/ disabled boundaries. Tests 8/8: cards render, member sees New Task btn, debounced search pushes q=, two empty states (clear -> bare /projects/p-1/tasks), error retry, pagination Next advances page=2 / Prev disabled, inline status Select fires updateTask(id, {status}). FRONTEND TOTAL 123/123 (+8)."

  - id: t16
    desc: "/projects/[id]/tasks/new/page.tsx: create form (title, description, priority Select, status Select default Todo, assignedTo Select loaded from useUsers, dueDate). RHF+Zod. All authed can create. Success -> push to task detail. Test happy + validation"
    files: ["frontend/src/app/projects/[id]/tasks/new/page.tsx", "frontend/src/app/projects/[id]/tasks/new/__tests__/page.test.tsx"]
    status: done
    receipt: "RHF + zodResolver. FormValues split from backend coerce-date: title string, description optional, dueDate string (HTML date input), status enum default todo, priority enum default medium, assignedTo string (UNASSIGNED sentinel or uuid). Submit maps UNASSIGNED -> null, dueDate string -> Date. useCreateTask via TanStack hook. useUsers populates assignee Select. Success -> toast.success + router.push('/projects/{id}/tasks/{taskId}'). All authed can create (no RBAC redirect; members allowed). Tests 3/3: member submits valid form (createTaskSpy called w/ projectId='p-1', Date dueDate, assignedTo null, pushes to detail), title required inline error, due date required inline error. Frontend 126/126 (+3)."

  - id: t17
    desc: "/projects/[id]/tasks/[taskId]/page.tsx: detail view (title, description, status, priority, assignee email, creator email, due date, timestamps). Edit + Delete buttons RBAC-gated. Member can Edit own (assignedTo===self || createdBy===self); never sees Delete. Test rendering + RBAC visibility for 3 roles x own/other"
    files: ["frontend/src/app/projects/[id]/tasks/[taskId]/page.tsx", "frontend/src/app/projects/[id]/tasks/[taskId]/__tests__/page.test.tsx"]
    status: done
    receipt: "useTask(taskId) + useUser(). isPrivileged = admin|PM bypass. isOwner = task.createdBy===user.id || task.assignedTo===user.id. canEdit = isPrivileged || isOwner. canDelete = isPrivileged only. Layout: title + creator description + status + priority badges; description w/ italic fallback; dl grid (Due date, Assignee w/ email or 'Unassigned' italics, Created, Updated). Edit -> Link. Delete -> disabled stub (t19). Back to tasks link. Error -> Retry. Tests 7/7: fields render w/ Unassigned, admin sees both buttons, PM sees both, member non-owner hides both, member who is creator sees Edit hides Delete, member who is assignee sees Edit hides Delete, error/missing -> Retry. Frontend 133/133 (+7)."

  - id: t18
    desc: "/projects/[id]/tasks/[taskId]/edit/page.tsx: prefilled update form. Server enforces ownership for members (403 surfaces as toast). Success -> push detail. Tests happy + 403 toast on bad attempt"
    files: ["frontend/src/app/projects/[id]/tasks/[taskId]/edit/page.tsx", "frontend/src/app/projects/[id]/tasks/[taskId]/edit/__tests__/page.test.tsx"]
    status: done
    receipt: "Mirrors t16 new-form pattern. Prefill via useEffect on task load: reset({title, description, dueDate: toDateInput, status, priority, assignedTo: task.assignedTo ?? UNASSIGNED}). Submit converts dueDate string -> Date, maps UNASSIGNED -> null. useUpdateTask(taskId). Success -> toast + push detail. API error -> toast.error (covers 403 FORBIDDEN_OWNERSHIP server-enforced for members). 'Checking permissions' not needed: ownership check happens server-side; UI shows form to all and lets server reject. Tests 2/2: admin prefills 'Launch', edits to 'Launch v2', updateSpy called w/ Date dueDate, pushes detail; api error -> mutation fired, pushSpy NOT called. Frontend 135/135."

  - id: t19
    desc: "DeleteTaskButton component (shadcn AlertDialog confirm 'Delete task? This cannot be undone.'). Fires useDeleteTask + router.push('/projects/[id]/tasks'). Wired into detail page Delete button (admin/PM only). Test confirm + cancel"
    files: ["frontend/src/components/tasks/delete-task-button.tsx", "frontend/src/components/tasks/__tests__/delete-task-button.test.tsx", "frontend/src/app/projects/[id]/tasks/[taskId]/page.tsx"]
    status: done
    receipt: "Destructive Button opens controlled AlertDialog (base-ui pattern: imperative setOpen, no asChild Trigger). Copy verbatim: 'Delete task?' title, 'This cannot be undone.' description. Confirm fires useDeleteTask.mutateAsync(taskId) -> toast.success(Deleted name) -> router.push('/projects/{projectId}/tasks'). Cancel closes w/o calling delete. API error -> toast.error. Detail page Delete stub replaced. Tests 3/3: opens w/ copy, confirm calls deleteSpy + push, cancel closes w/o calls. Phase D complete (t15-t19)."

